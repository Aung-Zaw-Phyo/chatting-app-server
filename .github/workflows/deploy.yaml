name: Node.js CI/CD to Lightsail

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: node:20

    steps:
    - uses: actions/checkout@v3
      with:
        node-version: 20

    - run: npm ci
    
    - name: Install dependencies
      run: npm install

    - name: Deploy to Lightsail
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          git config --global --add safe.directory /var/www/chatting-app-server
          sudo chown -R $USER:$USER /var/www/chatting-app-server
          cd /var/www/chatting-app-server
          echo "Before git pull:"
          git pull origin main
          echo "After git pull:"
          npm install
          pm2 restart index.js